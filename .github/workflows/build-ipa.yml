name: Build unsigned IPA

# Produces an UNSIGNED .ipa on a free macOS runner. Download it from the run's
# "Artifacts" section, then sign + install it on your iPhone with SideStore/AltStore.
# Run it manually from the Actions tab (workflow_dispatch) or on every push to main.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (needs iOS 26 SDK for Liquid Glass)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          echo "--- iOS SDKs ---"
          xcodebuild -showsdks | grep -i ios || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Resolve workspace & scheme
        id: xc
        run: |
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "workspace=$WS"  >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"

      - name: Archive (no code signing)
        run: |
          set -eo pipefail
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package unsigned .ipa
        run: |
          set -eo pipefail
          APP=$(ls -d "$RUNNER_TEMP/app.xcarchive/Products/Applications/"*.app | head -1)
          echo "Packaging: $APP"
          rm -rf "$RUNNER_TEMP/Payload" "$RUNNER_TEMP/Sweep.ipa"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          (cd "$RUNNER_TEMP" && zip -qry Sweep.ipa Payload)
          ls -lh "$RUNNER_TEMP/Sweep.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sweep-unsigned-ipa
          path: ${{ runner.temp }}/Sweep.ipa
          if-no-files-found: error
